name: Package
on:
  push:
    tags:
      - 'v*'
permissions: write-all

jobs:
  change-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: get-version
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Update version in source files
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          # package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/g" package.json
          # tauri.conf.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/g" src-tauri/tauri.conf.json
          # Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/g" src-tauri/Cargo.toml

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: ./*
          include-hidden-files: true
          if-no-files-found: error

  build-for-macos:
    needs: change-version
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Rename artifacts
        run: |
          VERSION=${{ needs.change-version.outputs.version }}
          ARCH=$([[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]] && echo "aarch64" || echo "x64")
          # Rename updater bundle
          if [ -f "src-tauri/target/${{ matrix.target }}/release/bundle/macos/易翻.app.tar.gz" ]; then
            mv "src-tauri/target/${{ matrix.target }}/release/bundle/macos/易翻.app.tar.gz" \
               "src-tauri/target/${{ matrix.target }}/release/bundle/macos/yi-fan_${VERSION}_${ARCH}.app.tar.gz"
            mv "src-tauri/target/${{ matrix.target }}/release/bundle/macos/易翻.app.tar.gz.sig" \
               "src-tauri/target/${{ matrix.target }}/release/bundle/macos/yi-fan_${VERSION}_${ARCH}.app.tar.gz.sig"
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos_${{ matrix.target }}_dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload updater bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos_${{ matrix.target }}_updater
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz*
          if-no-files-found: error

  build-for-windows:
    needs: change-version
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows_${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup*
          if-no-files-found: error

  build-for-linux:
    needs: change-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxcb1 \
            libxrandr2 \
            libdbus-1-3

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: linux_x86_64_deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: linux_x86_64_rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux_x86_64_appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage*
          if-no-files-found: error

  create-release:
    needs: [change-version, build-for-macos, build-for-windows, build-for-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: find artifacts -type f | head -50

      - name: Collect release files
        run: |
          mkdir -p release
          # macOS DMG
          cp artifacts/macos_*_dmg/*.dmg release/ 2>/dev/null || true
          # macOS updater
          cp artifacts/macos_*_updater/*.app.tar.gz* release/ 2>/dev/null || true
          # Windows NSIS
          cp artifacts/windows_*/*setup* release/ 2>/dev/null || true
          # Linux
          cp artifacts/linux_*_deb/*.deb release/ 2>/dev/null || true
          cp artifacts/linux_*_rpm/*.rpm release/ 2>/dev/null || true
          cp artifacts/linux_*_appimage/*.AppImage* release/ 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.change-version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-update:
    needs: [change-version, build-for-macos, build-for-windows, build-for-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate update.json
        run: node scripts/updater.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.change-version.outputs.version }}

      - name: Upload update.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: updater
          files: update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
